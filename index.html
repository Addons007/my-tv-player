<!--
SYSTEM UI MANIFEST: OS 18 PERMANENT TV REGULATIONS
RESOLUTION: 1920x1080 Fixed Baseline
OVERSCAN: 90px Side / 60px Top-Bottom
GRID: 6-Column Symmetrical (24px Gutter)
POSTER RATIO: 0.66 (2:3)
TEXT: 24px Minimum Baseline
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *; img-src * data: blob:; media-src * data: blob:;">
    <title>AppleFireOS · Liquid Glass Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* ============================================
           APPLE TV DESIGN SYSTEM - ENHANCED
           ============================================ */

        :root {
            /* CANVAS & LAYOUT */
            --canvas-w: 1920px;
            --canvas-h: 1080px;
            --side-gap: 90px;
            --top-gap: 60px;
            
            /* COLOR PALETTE */
            --bg-primary: #000000;
            --bg-secondary: #0f0f12;
            --bg-tertiary: rgba(15, 15, 18, 0.98);
            --bg-glass: rgba(20, 20, 23, 0.4);
            --bg-overlay: rgba(0, 0, 0, 0.95);
            
            --accent-primary: #00D4FF;
            --accent-secondary: #5AC8FA;
            --accent-live: #FF3B30;
            --accent-success: #34C759;
            --accent-warning: #FF9500;
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-tertiary: rgba(255, 255, 255, 0.4);
            --text-quaternary: rgba(255, 255, 255, 0.2);
            
            /* SHADOWS */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 40px 100px rgba(0, 0, 0, 0.6);
            --shadow-inset: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            
            /* TIMING & EASING */
            --timing-fast: 150ms;
            --timing-normal: 300ms;
            --timing-slow: 500ms;
            --easing-apple: cubic-bezier(0.2, 1, 0.3, 1);
            
            /* TYPOGRAPHY SCALE */
            --text-xs: 14px;
            --text-sm: 16px;
            --text-base: 18px;
            --text-lg: 20px;
            --text-xl: 24px;
            --text-2xl: 28px;
            --text-3xl: 32px;
            --text-4xl: 48px;
            --text-5xl: 64px;
            --text-6xl: 80px;
            
            /* BORDER RADIUS */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 40px;
        }

        /* ============================================
           GLOBAL RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            scrollbar-width: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, system-ui, 'SF Pro Display', sans-serif;
            overflow: hidden;
            width: var(--canvas-w);
            height: var(--canvas-h);
            position: fixed;
            font-feature-settings: "ss01";
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
           AMBIENT GLOW - ENHANCED & RESPONSIVE
           ============================================ */
        .ambient-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(0, 212, 255, 0.15), transparent 50%);
            z-index: 1;
            transition: background var(--timing-normal) var(--easing-apple);
            pointer-events: none;
            opacity: 0.8;
        }

        /* ============================================
           NAVIGATION BAR - GLASS EFFECT
           ============================================ */
        .nav-island-container {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
        }

        .nav-island {
            padding: 8px;
            background: rgba(15, 15, 18, 0.6);
            backdrop-filter: blur(30px);
            border-radius: var(--radius-xl);
            border: var(--shadow-inset);
            display: flex;
            gap: 8px;
            height: 75px;
            align-items: center;
            box-shadow: var(--shadow-md);
            transition: all var(--timing-normal) var(--easing-apple);
        }

        .nav-item {
            padding: 12px 25px;
            border-radius: var(--radius-lg);
            font-size: var(--text-lg);
            color: var(--text-tertiary);
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all var(--timing-fast) var(--easing-apple);
            font-weight: 600;
            will-change: background-color, color, transform;
        }

        .nav-item:focus,
        .nav-item.active {
            background: var(--text-primary) !important;
            color: var(--bg-primary) !important;
            font-weight: 700 !important;
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        /* ============================================
           PAGE CONTAINER
           ============================================ */
        .page {
            position: absolute;
            inset: 0;
            display: none;
            padding: 160px 0 0 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 10;
        }

        .page.active {
            display: block;
        }

        /* ============================================
           HERO CAROUSEL - WITH ENHANCED GRADIENT
           ============================================ */
        .hero-carousel {
            margin: 0 var(--side-gap);
            height: 520px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            border: var(--shadow-inset);
            background-size: cover;
            background-position: center;
            transition: background-image var(--timing-normal) var(--easing-apple);
            box-shadow: var(--shadow-lg);
        }

        .hero-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            padding: 60px 80px;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(0, 0, 0, 0.7) 30%,
                rgba(0, 0, 0, 0.4) 60%,
                transparent 100%
            );
            position: relative;
        }

        .hero-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(0, 212, 255, 0) 0%,
                rgba(0, 212, 255, 0.05) 100%
            );
            opacity: 0;
            transition: opacity var(--timing-normal) var(--easing-apple);
            pointer-events: none;
        }

        .hero-carousel:focus-within .hero-slide::before {
            opacity: 1;
        }

        .movie-title {
            font-size: var(--text-6xl);
            font-weight: 900;
            letter-spacing: -3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 0.9;
        }

        .movie-meta {
            font-size: var(--text-lg);
            opacity: 0.9;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .rating-badge {
            background: rgba(255, 255, 255, 0.15);
            color: #ffd700;
            padding: 6px 12px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: var(--text-xs);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .movie-desc {
            font-size: var(--text-lg);
            line-height: 1.5;
            opacity: 0.7;
            margin-bottom: 30px;
            max-width: 800px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-btn {
            padding: 18px 48px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--text-primary);
            color: var(--bg-primary);
            font-size: var(--text-lg);
            font-weight: 700;
            cursor: pointer;
            transition: all var(--timing-fast) var(--easing-apple);
            box-shadow: var(--shadow-md);
            will-change: transform, box-shadow;
        }

        .hero-btn:focus {
            transform: scale(1.08) translateY(-2px);
            background: #f5f5f7;
            box-shadow: var(--shadow-xl);
        }

        .hero-btn:active {
            transform: scale(0.97);
        }

        .hero-btn.secondary {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            backdrop-filter: blur(20px);
        }

        .hero-btn.secondary:focus {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ============================================
           SHELVES - HORIZONTAL CAROUSEL
           ============================================ */
        .shelf-container {
            margin: 50px var(--side-gap);
        }

        .shelf-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .shelf-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-primary);
            border-radius: 4px;
            transition: height var(--timing-normal) var(--easing-apple);
        }

        .shelf-row {
            display: flex;
            gap: 25px;
            padding: 40px 20px;
            overflow-x: auto;
            align-items: flex-start;
            scroll-behavior: smooth;
            overflow-y: visible;
        }

        /* ============================================
           MOVIE CARDS - WITH ENHANCED FOCUS
           ============================================ */
        .movie-card {
            flex: 0 0 240px;
            min-width: 240px;
            max-width: 240px;
            height: 460px;
            cursor: pointer;
            position: relative;
            background: none;
            border: none;
            padding: 0;
            text-align: left;
            color: inherit;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            will-change: transform;
            transition: transform var(--timing-fast) var(--easing-apple),
                        box-shadow var(--timing-normal) var(--easing-apple);
        }

        .movie-card img {
            width: 240px;
            height: 360px;
            object-fit: cover;
            border-radius: var(--radius-lg);
            border: 3px solid transparent;
            background: linear-gradient(
                90deg,
                var(--bg-secondary) 0%,
                var(--bg-tertiary) 50%,
                var(--bg-secondary) 100%
            );
            background-size: 1000px 100%;
            flex-shrink: 0;
            will-change: border-color, box-shadow;
            transition: all var(--timing-normal) var(--easing-apple);
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .movie-card img {
            animation: shimmer 2s infinite;
        }

        .movie-card:focus {
            transform: scale(1.06) translateY(-4px);
            z-index: 100;
            outline: none;
        }

        .movie-card:focus img {
            border-color: var(--text-primary);
            box-shadow: var(--shadow-lg);
        }

        .movie-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(0, 212, 255, 0) 0%,
                rgba(0, 212, 255, 0.1) 100%
            );
            border-radius: var(--radius-lg);
            opacity: 0;
            transition: opacity var(--timing-fast) var(--easing-apple);
            z-index: 1;
            pointer-events: none;
        }

        .movie-card:focus::before {
            opacity: 1;
        }

        .card-rating {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 12px;
            border-radius: var(--radius-md);
            color: #ffd700;
            font-weight: 800;
            font-size: var(--text-xs);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .card-info {
            margin-top: 15px;
            padding: 0 5px;
            width: 100%;
            overflow: hidden;
        }

        .card-title {
            font-size: var(--text-base);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .card-year {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        /* ============================================
           DETAILS PAGE - OVERLAY
           ============================================ */
        #details-page {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: none;
            background-size: cover;
            background-position: center;
        }

        .details-overlay {
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(0, 0, 0, 0.8) 30%,
                rgba(0, 0, 0, 0.5) 60%,
                transparent 100%
            );
            padding: 100px var(--side-gap);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .details-content {
            max-width: 900px;
        }

        .details-title {
            font-size: var(--text-6xl);
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 0.9;
        }

        .details-desc {
            font-size: var(--text-lg);
            line-height: 1.6;
            opacity: 0.7;
            margin-bottom: 40px;
            max-width: 700px;
        }

        .details-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        /* ============================================
           STREAM PICKER - GLASS PANEL
           ============================================ */
        .stream-picker {
            display: none;
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border-radius: var(--radius-xl);
            padding: 30px;
            border: var(--shadow-inset);
            max-width: 1000px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .stream-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all var(--timing-fast) var(--easing-apple);
        }

        .stream-item:focus {
            background: var(--text-primary);
            color: var(--bg-primary);
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .stream-info {
            flex: 1;
        }

        .stream-name {
            font-size: var(--text-lg);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stream-meta {
            font-size: var(--text-sm);
            opacity: 0.6;
            transition: opacity var(--timing-fast) var(--easing-apple);
        }

        .stream-item:focus .stream-meta {
            opacity: 0.9;
        }

        /* ============================================
           GRID LAYOUTS - DISCOVERY & SEARCH
           ============================================ */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        /* ============================================
           LIVE TV - VERTICAL LIST OVERRIDE
           ============================================ */
        #live .channels-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #live .channel-card {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 25px;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            width: 100%;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all var(--timing-fast) var(--easing-apple);
        }

        #live .channel-card:focus {
            background: var(--text-primary);
            color: var(--bg-primary);
            transform: scale(1.03) translateX(4px);
            box-shadow: var(--shadow-md);
        }

        #live .channel-card img {
            width: 130px;
            height: 80px;
            object-fit: contain;
            background: transparent;
            border-radius: var(--radius-md);
        }

        .epg-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .epg-progress-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .epg-progress-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width var(--timing-normal) var(--easing-apple);
        }

        .epg-time {
            font-size: var(--text-xs);
            color: var(--accent-live);
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .channel-card:focus .epg-time,
        .channel-card:focus .current-program {
            color: var(--bg-primary) !important;
            opacity: 1;
        }

        /* ============================================
           SEARCH INPUT - GLASS EFFECT
           ============================================ */
        #search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: var(--radius-md);
            padding: 20px 25px;
            color: var(--text-primary);
            font-size: var(--text-xl);
            font-weight: 600;
            outline: none;
            transition: all var(--timing-normal) var(--easing-apple);
            margin-bottom: 20px;
            box-shadow: var(--shadow-inset);
            backdrop-filter: blur(20px);
        }

        #search-input::placeholder {
            color: var(--text-quaternary);
        }

        #search-input:focus {
            background: var(--text-primary);
            color: var(--bg-primary);
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        /* ============================================
           FOCUS STATE SYSTEM - UNIVERSAL
           ============================================ */
        [tabindex="0"] {
            transition: all var(--timing-fast) var(--easing-apple) !important;
            will-change: transform, background-color, box-shadow;
            outline: none !important;
        }

        [tabindex="0"]:focus {
            transform: scale(1.05) translateY(-2px) !important;
            z-index: 1000 !important;
            box-shadow: var(--shadow-lg) !important;
        }

        .sidebar-item:focus,
        .settings-row:focus,
        .nav-item:focus,
        .addon-card:focus {
            background-color: var(--text-primary) !important;
            color: var(--bg-primary) !important;
        }

        [tabindex="0"]:focus .main-txt,
        [tabindex="0"]:focus .sub-txt,
        [tabindex="0"]:focus .row-label,
        [tabindex="0"]:focus .row-value,
        [tabindex="0"]:focus .addon-name,
        [tabindex="0"]:focus .addon-description,
        [tabindex="0"]:focus .addon-type,
        [tabindex="0"]:focus .addon-version {
            color: var(--bg-primary) !important;
        }

        /* ============================================
           SPLIT VIEW LAYOUT
           ============================================ */
        .split-view-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
            height: calc(1080px - 220px);
            margin: 0 var(--side-gap);
            padding-top: 20px;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: visible !important;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px 20px 20px;
            border-radius: var(--radius-lg);
        }

        .sidebar-category-label {
            font-size: var(--text-xs);
            font-weight: 800;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 25px 0 10px 15px;
        }

        .sidebar-item {
            padding: 18px 25px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            position: relative;
            transition: all var(--timing-fast) var(--easing-apple);
        }

        .sidebar-item .main-txt {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
        }

        .sidebar-item .sub-txt {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
        }

        .sidebar-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* ============================================
           CONTENT PANEL
           ============================================ */
        .content-glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border-radius: var(--radius-xl);
            padding: 45px;
            overflow-y: auto;
            overflow-x: visible !important;
            border: var(--shadow-inset);
            box-shadow: var(--shadow-lg);
        }

        /* ============================================
           SETTINGS CARDS
           ============================================ */
        .settings-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: visible !important;
            transition: all var(--timing-normal) var(--easing-apple);
        }

        .card-header {
            color: var(--accent-primary);
            font-size: var(--text-xs);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin: 0 -10px;
            border-radius: var(--radius-md);
            transition: all var(--timing-fast) var(--easing-apple);
            cursor: pointer;
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .settings-row:focus {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        .row-label {
            font-size: var(--text-lg);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-primary);
        }

        .row-value {
            font-size: var(--text-base);
            color: var(--text-tertiary);
            transition: color var(--timing-fast) var(--easing-apple);
        }

        .row-value.connected {
            color: var(--accent-success);
            font-weight: 700;
        }

        /* ============================================
           ADDON CARDS
           ============================================ */
        .addon-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            gap: 25px;

        .addon-icon {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);

        .addon-info {

        .addon-header-row {

        .addon-name {

    </style>
</head>
<body>

                    <div class="movie-meta" id="hero-meta">
                        <span class="rating-badge">★ 8.3</span> <span>2025</span> <span>HD • 4K</span>

        <div class="shelf-container"><h3 class="shelf-title">Popular Movies</h3><div class="shelf-row" id="popular-movies-list"></div></div>

    <!-- SEARCH PAGE (Split View) -->

    <!-- SYSTEM PAGE -->
    <div id="settings-view" class="page">
        <div class="split-view-container">

                <button class="sidebar-item" tabindex="0" onclick="App.renderSettings('profile')">

<script>
    function playMovie(url) {
        if (window.Android && window.Android.playVideo) {
            window.Android.playVideo(url);
        } else {
            console.error("Eroare: Bridge-ul Android nu a fost găsit!");
            alert("Playing: " + url);
        }
    }

    const App = {
        featuredItem: null,
        config: {
            m3u_url: null,
            stremio_auth_key: null,
            iptv_exclude: ""
        },
        iptvData: [],
        installedAddons: [],

        init() {
            const saved = localStorage.getItem('app_config');
            if (saved) {
                try {
                    this.config = Object.assign(this.config, JSON.parse(saved));
                } catch(e) { console.error("Config load error", e); }
            }

            this.fetchCinemeta('movie');
            this.fetchCinemeta('series');
            this.setupListeners();
            this.setupNavigation();

            if (this.config.stremio_auth_key) {
                this.fetchAddons();
            }
            if (this.config.m3u_url) {
                this.fetchIPTV();
            }
        },

        playLiveStream(channel) {
            playMovie(channel.url);
        },

        async fetchAddons() {
            if (!this.config.stremio_auth_key) return;
            const url = `https://api.strem.io/api/addonCollectionGet`;
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: 'AddonCollectionGet',
                        authKey: this.config.stremio_auth_key
                    })
                });
                const data = await resp.json();
                if (data.result && data.result.addons) {
                    this.installedAddons = data.result.addons;
                    console.log("Addons loaded:", this.installedAddons.length);
                }
            } catch(e) { console.error("Addon fetch failed", e); }
        },

        async fetchIPTV() {
            if (!this.config.m3u_url) return;
            try {
                let url = this.config.m3u_url;
                let text = "";

                try {
                    const resp = await fetch(url);
                    if (resp.ok) text = await resp.text();
                } catch (e) {}

                if (!text) {
                    const proxies = [
                        `https://api.allorigins.win/raw?url=`,
                        `https://corsproxy.io/?`
                    ];
                    for (let p of proxies) {
                        try {
                            const resp = await fetch(p + encodeURIComponent(url));
                            if (resp.ok) {
                                text = await resp.text();
                                if (text && text.length > 10) break;
                            }
                        } catch(err) {}
                    }
                }

                if (!text || text.length < 10) throw new Error("Could not fetch M3U.");
                this.parseM3U(text);
            } catch(e) { console.error("IPTV fetch failed", e); }
        },

        handleFileUpload(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                this.parseM3U(e.target.result);
                alert("M3U File loaded successfully!");
            };
            reader.readAsText(file);
        },

        parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];

            let userExcludes = [];
            if (this.config.iptv_exclude) {
                userExcludes = this.config.iptv_exclude.split(',').map(s => s.trim().toLowerCase()).filter(s => s);
            }

            const groupsSet = new Set();

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]+)"/i);
                    const rawGroupName = groupMatch ? groupMatch[1] : "General";
                    const lowerGroup = rawGroupName.toLowerCase();

                    if (userExcludes.some(ex => lowerGroup.includes(ex))) {
                        continue;
                    }

                    const titleMatch = line.match(/,(.*)$/);
                    const title = titleMatch ? titleMatch[1].trim() : "Unknown";

                    let url = "";
                    for (let j = i + 1; j < Math.min(i + 15, lines.length); j++) {
                        const nextLine = lines[j].trim();
                        if (nextLine.startsWith('http') || nextLine.includes('://')) {
                            url = nextLine;
                            i = j;
                            break;
                        } else if (nextLine.startsWith('#EXTINF')) {
                            break;
                        }
                    }

                    if (url) {
                        channels.push({
                            name: title,
                            group: rawGroupName,
                            url: url,
                            logo: line.match(/tvg-logo="([^"]+)"/i)?.[1] || ''
                        });
                        groupsSet.add(rawGroupName);
                    }
                }
            }

            this.iptvData = channels;
            const groupsArray = Array.from(groupsSet);

            this.renderIPTVGroups(groupsArray);
            if (groupsArray.length > 0) this.filterIPTV(groupsArray[0]);
        },

        async fetchCinemeta(type = 'movie') {
            const url = `https://v3-cinemeta.strem.io/catalog/${type}/top.json`;
            try {
                let resp;
                try {
                    resp = await fetch(url, { referrerPolicy: "no-referrer" });
                } catch(e) {
                    const proxyUrl = `https://corsproxy.io/?` + encodeURIComponent(url);
                    resp = await fetch(proxyUrl, { referrerPolicy: "no-referrer" });
                }
                const data = await resp.json();
                this.renderHorizontalCatalog(data.metas || [], type);

                if (type === 'movie') {
                    this.renderGridCatalog(data.metas || [], type, 'discover-grid');
                } else {
                    this.renderGridCatalog(data.metas || [], type, 'discover-grid');
                }

                if (type === 'movie' && data.metas && data.metas.length > 0) {
                    this.featuredItem = data.metas[0];
                    this.updateHero(data.metas[0]);
                }
            } catch (e) { console.error("Fetch catalog failed", e); }
        },

        updateHero(item) {
            const hero = document.getElementById('main-hero');
            if(!hero) return;
            hero.style.backgroundImage = `linear-gradient(to top, rgba(0,0,0,0.95) 10%, rgba(0,0,0,0.4) 50%, transparent), url('${item.background || item.poster}')`;
            hero.querySelector('.movie-title').innerText = item.name;
            document.getElementById('hero-meta').innerHTML = `<span class="rating-badge">★ ${item.imdbRating || 'N/A'}</span> <span>${item.releaseInfo || item.year}</span> <span>4K • HDR</span>`;
            document.getElementById('hero-desc').innerText = item.description || "Stream the latest content in ultra high definition.";
            document.getElementById('hero-details-btn').onclick = () => this.showDetails(item.id, 'movie');
        },

        renderHorizontalCatalog(items, type, customId) {
            const containerId = customId || (type === 'movie' ? 'popular-movies-list' : 'popular-series-list');
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = items.slice(0, 15).map(item => `
                <button class="movie-card" tabindex="0" onclick="window.App.showDetails('${item.id}', '${type}')">
                    <div class="card-rating">★ ${item.imdbRating || 'N/A'}</div>
                    <img src="${item.poster}" loading="lazy" decoding="async" onerror="this.src='https://via.placeholder.com/240x360?text=No+Poster'">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-year">${item.releaseInfo || item.year}</div>
                    </div>
                </button>
            `).join('');
        },

        renderGridCatalog(items, type, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = items.map(item => `
                <button class="movie-card" tabindex="0" onclick="window.App.showDetails('${item.id}', '${item.type || type}')">
                    <div class="card-rating">★ ${item.imdbRating || 'N/A'}</div>
                    <img src="${item.poster}" loading="lazy" decoding="async" onerror="this.src='https://via.placeholder.com/240x360?text=No+Poster'">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-year">${item.releaseInfo || item.year}</div>
                    </div>
                </button>
            `).join('');
        },

        changeDiscoverType(type, btn) {
            document.querySelectorAll('#discover-sidebar .sidebar-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('discover-header').innerText = type === 'movie' ? 'Trending Movies' : 'Trending Series';
            this.fetchCinemeta(type);
        },

        async performSearch(query) {
            if (!query) return;
            const container = document.getElementById('search-results-list');
            container.innerHTML = "<p style='padding: 20px; opacity: 0.5'>Searching movies and series...</p>";

            try {
                const movieUrl = `https://v3-cinemeta.strem.io/catalog/movie/search.json?search=${encodeURIComponent(query)}`;
                const seriesUrl = `https://v3-cinemeta.strem.io/catalog/series/search.json?search=${encodeURIComponent(query)}`;

                const proxy = "https://corsproxy.io/?";

                const [movieResp, seriesResp] = await Promise.all([
                    fetch(proxy + encodeURIComponent(movieUrl)),
                    fetch(proxy + encodeURIComponent(seriesUrl))
                ]);

                const movieData = await movieResp.json();
                const seriesData = await seriesResp.json();

                const combined = [
                    ...(movieData.metas || []).map(m => ({ ...m, type: 'movie' })),
                    ...(seriesData.metas || []).map(m => ({ ...m, type: 'series' }))
                ];

                if (combined.length === 0) {
                    container.innerHTML = "<p style='padding: 20px; opacity: 0.5'>No live results found on Cinemeta.</p>";
                } else {
                    this.renderGridCatalog(combined, 'movie', 'search-results-list');
                }
                document.getElementById('search-title').innerText = `Results for: ${query}`;
            } catch(e) {
                console.error("Search error", e);
                container.innerHTML = "<p style='padding: 20px; color: #ff4444'>Connection error. Please try again.</p>";
            }
        },

        async showDetails(id, type) {
            const url = `https://v3-cinemeta.strem.io/meta/${type}/${id}.json`;
            try {
                let resp;
                try {
                    resp = await fetch(url, { referrerPolicy: "no-referrer" });
                } catch(e) {
                    const proxyUrl = `https://corsproxy.io/?` + encodeURIComponent(url);
                    resp = await fetch(proxyUrl, { referrerPolicy: "no-referrer" });
                }
                const data = await resp.json();
                const meta = data.meta;

                const page = document.getElementById('details-page');
                page.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.95) 30%, rgba(0,0,0,0.5) 60%, transparent), url('${meta.background || meta.poster}')`;
                document.getElementById('det-title').innerText = meta.name;
                document.getElementById('det-desc').innerText = meta.description || "No description available.";
                document.getElementById('det-meta').innerHTML = `
                    <span class="rating-badge">★ ${meta.imdbRating || 'N/A'}</span>
                    <span>${meta.releaseInfo || meta.year}</span>
                    <span>${meta.genres ? meta.genres.join(' • ') : ''}</span>
                `;

                document.getElementById('stream-picker-list').style.display = 'none';
                document.getElementById('streams-container').innerHTML = "";

                const playBtn = document.getElementById('det-play-btn');
                playBtn.innerText = "▶ Find Streams";
                playBtn.onclick = () => this.showStreamPicker(type, id);

                page.style.display = 'block';
                setTimeout(() => document.getElementById('det-play-btn').focus(), 100);

            } catch(e) { console.error("Details fetch error:", e); }
        },

        async showStreamPicker(type, id) {
            const picker = document.getElementById('stream-picker-list');
            const container = document.getElementById('streams-container');
            const playBtn = document.getElementById('det-play-btn');

            playBtn.innerText = "▶ Searching...";
            picker.style.display = 'block';
            container.innerHTML = "<p style='padding: 20px; opacity: 0.5'>Searching addons for streams...</p>";

            const allStreams = [];
            const streamAddons = this.installedAddons.filter(a =>
                a.manifest.resources.some(r => r === 'stream' || (r.name === 'stream')) &&
                a.manifest.types.includes(type)
            );

            if (streamAddons.length === 0) {
                container.innerHTML = "<p style='padding: 20px; color: #ff4444'>No streaming addons installed.</p>";
                playBtn.innerText = "▶ No Addons";
                return;
            }

            for (const addon of streamAddons) {
                try {
                    const url = `${addon.transportUrl.replace('/manifest.json', '')}/stream/${type}/${id}.json`;
                    let resp;
                    try {
                        resp = await fetch(url);
                    } catch(e) {
                        resp = await fetch(`https://corsproxy.io/?` + encodeURIComponent(url));
                    }
                    const data = await resp.json();
                    if (data.streams) {
                        data.streams.forEach(s => {
                            s.addonName = addon.manifest.name;
                            allStreams.push(s);
                        });
                    }
                } catch(e) { console.warn("Failed to fetch from", addon.manifest.name); }
            }

            if (allStreams.length > 0) {
                playBtn.innerText = `▶ ${allStreams.length} Sources Found`;
                container.innerHTML = allStreams.map((s, idx) => `
                    <div class="stream-item" tabindex="0" id="stream-${idx}" onclick="playMovie('${s.url || s.externalUrl}')">
                        <div class="stream-info">
                            <div class="stream-name">${s.title || s.name || 'Unknown Source'}</div>
                            <div class="stream-meta">${s.addonName} • ${s.behaviorHints?.bingeGroup || 'Direct Stream'}</div>
                        </div>
                    </div>
                `).join('');

                setTimeout(() => {
                    const first = document.getElementById('stream-0');
                    if (first) first.focus();
                }, 100);
            } else {
                container.innerHTML = "<p style='padding: 20px; color: #ff4444'>No streams found for this item.</p>";
                playBtn.innerText = "▶ No Sources Found";
            }
        },

        hideDetails() {
            document.getElementById('details-page').style.display = 'none';
            const activeNav = document.querySelector('.nav-item.active');
            if(activeNav) activeNav.focus();
        },

        navigate(id, btn, color) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('glow').style.background = `radial-gradient(circle at 50% -20%, ${color}, transparent 50%)`;

            if(id === 'settings-view') this.renderSettings('addons');
            if(id === 'search') setTimeout(() => document.getElementById('search-input').focus(), 100);
            if(id === 'discover') this.fetchCinemeta('movie');
        },

        setupListeners() {
            document.addEventListener('keydown', (e) => {
                const key = e.keyCode || e.which;
                const active = document.activeElement;

                if (active && active.classList.contains('movie-card')) {
                    if (key === 40) {
                        const currentShelf = active.closest('.shelf-container');
                        if (currentShelf) {
                            const page = currentShelf.closest('.page');
                            const shelves = Array.from(page.querySelectorAll('.shelf-container'));
                            const nextShelf = shelves[shelves.indexOf(currentShelf) + 1];
                            if (nextShelf) {
                                this.focusNearestInShelf(active, nextShelf);
                                e.preventDefault(); return;
                            }
                        }
                    } else if (key === 38) {
