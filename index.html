<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Apple TV Streaming Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Apple TV Streaming Player</h1>
        <nav>
            <ul>
                <li><a href="#search">Search</a></li>
                <li><a href="#discovery">Discovery</a></li>
                <li><a href="#settings">Settings</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="search">
            <h2>Search</h2>
            <input type="text" id="searchInput" placeholder="Search for content...">
            <button id="searchButton">Search</button>
        </section>
        <section id="discovery">
            <h2>Discover Content</h2>
            <div id="contentContainer"></div>
        </section>
        <section id="settings">
            <h2>Settings</h2>
            <form>
                <label for="ipAddress">IPTV Address:</label>
                <input type="text" id="ipAddress" name="ipAddress">
                <button type="submit">Save Settings</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Enhanced Apple TV Streaming Player</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
